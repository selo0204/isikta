<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager – Işıkta</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.1/dist/cropper.css" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/cropperjs@1.6.1/dist/cropper.js"></script>

  <script>
    var CroppedImageControl = createClass({
      getInitialState: function () {
        return { showCropper: false, cropSrc: null, cropFileName: "photo.webp" };
      },

      openCropperWithFile: function (file) {
        var reader = new FileReader();
        var self = this;
        reader.onload = function (e) {
          self.setState({
            showCropper: true,
            cropSrc: e.target.result,
            cropFileName: file.name,
          });
        };
        reader.readAsDataURL(file);
      },

      handleFileInput: function (e) {
        var file = e.target.files && e.target.files[0];
        if (file) this.openCropperWithFile(file);
      },

      handleRecrop: function () {
        var value = this.props.value;
        if (!value) return;
        var self = this;
        var url = this.props.getAsset ? this.props.getAsset(value).toString() : value;
        fetch(url)
          .then(function (res) { return res.blob(); })
          .then(function (blob) {
            var file = new File([blob], "recrop.webp", { type: blob.type || "image/webp" });
            self.openCropperWithFile(file);
          });
      },

      componentDidUpdate: function (prevProps, prevState) {
        var self = this;
        if (this.state.showCropper && !prevState.showCropper) {
          setTimeout(function () {
            var img = document.getElementById("crop-image-" + self._instanceId);
            if (img && window.Cropper) {
              self.cropper = new window.Cropper(img, { viewMode: 1, autoCropArea: 1 });
            }
          }, 50);
        }
      },

      componentWillMount: function () {
        this._instanceId = Math.random().toString(36).slice(2);
      },

      confirmCrop: function () {
        var self = this;
        if (!this.cropper) return;
        var canvas = this.cropper.getCroppedCanvas();
        canvas.toBlob(function (blob) {
          var stamp = Date.now();
          var baseName = self.state.cropFileName.replace(/\.[^.]+$/, "");
          var croppedFile = new File([blob], baseName + "-crop-" + stamp + ".webp", {
            type: "image/webp",
          });
          self.props.onChange(croppedFile);
          self.cropper.destroy();
          self.cropper = null;
          self.setState({ showCropper: false, cropSrc: null });
        }, "image/webp", 0.9);
      },

      cancelCrop: function () {
        if (this.cropper) {
          this.cropper.destroy();
          this.cropper = null;
        }
        this.setState({ showCropper: false, cropSrc: null });
      },

      render: function () {
        var value = this.props.value;
        var getAsset = this.props.getAsset;
        var previewSrc = value && getAsset ? getAsset(value).toString() : value;
        var inputId = "file-input-" + this._instanceId;

        var rowChildren = [];

        if (previewSrc) {
          rowChildren.push(
            h("img", {
              key: "preview",
              src: previewSrc,
              style: {
                width: "70px",
                height: "70px",
                objectFit: "cover",
                borderRadius: "6px",
                flexShrink: 0,
              },
            })
          );
        }

        rowChildren.push(
          h(
            "label",
            {
              key: "file-label",
              htmlFor: inputId,
              style: {
                padding: "6px 12px",
                borderRadius: "4px",
                border: "1px solid #ccc",
                background: "#f7f7f7",
                color: "#333",
                cursor: "pointer",
                fontSize: "13px",
                whiteSpace: "nowrap",
              },
            },
            previewSrc ? "Bild ändern" : "Bild auswählen"
          )
        );

        rowChildren.push(
          h("input", {
            key: "file-input",
            id: inputId,
            type: "file",
            accept: "image/*",
            onChange: this.handleFileInput,
            style: { display: "none" },
          })
        );

        if (previewSrc) {
          rowChildren.push(
            h(
              "button",
              {
                key: "recrop-btn",
                type: "button",
                onClick: this.handleRecrop,
                style: {
                  padding: "6px 12px",
                  borderRadius: "4px",
                  border: "1px solid #c97b84",
                  background: "transparent",
                  color: "#c97b84",
                  cursor: "pointer",
                  fontSize: "13px",
                  whiteSpace: "nowrap",
                },
              },
              "Neu zuschneiden"
            )
          );
        }

        var children = [
          h(
            "div",
            {
              key: "row",
              style: { display: "flex", alignItems: "center", gap: "8px" },
            },
            rowChildren
          ),
        ];

        if (this.state.showCropper) {
          children.push(
            h(
              "div",
              {
                key: "crop-modal",
                style: {
                  position: "fixed",
                  inset: 0,
                  background: "rgba(0,0,0,0.85)",
                  zIndex: 9999,
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  justifyContent: "center",
                  padding: "20px",
                },
              },
              h(
                "div",
                { style: { maxWidth: "800px", maxHeight: "70vh", overflow: "hidden" } },
                h("img", {
                  id: "crop-image-" + this._instanceId,
                  src: this.state.cropSrc,
                  style: { maxWidth: "100%" },
                })
              ),
              h(
                "div",
                { style: { marginTop: "16px" } },
                h(
                  "button",
                  {
                    type: "button",
                    onClick: this.confirmCrop,
                    style: {
                      padding: "10px 24px",
                      marginRight: "10px",
                      borderRadius: "4px",
                      border: "none",
                      background: "#c97b84",
                      color: "#fff",
                      cursor: "pointer",
                    },
                  },
                  "Zuschnitt übernehmen"
                ),
                h(
                  "button",
                  {
                    type: "button",
                    onClick: this.cancelCrop,
                    style: {
                      padding: "10px 24px",
                      borderRadius: "4px",
                      border: "1px solid #fff",
                      background: "transparent",
                      color: "#fff",
                      cursor: "pointer",
                    },
                  },
                  "Abbrechen"
                )
              )
            )
          );
        }

        return h("div", {}, children);
      },
    });

    var CroppedImagePreview = createClass({
      render: function () {
        var value = this.props.value;
        var getAsset = this.props.getAsset;
        var src = value && getAsset ? getAsset(value).toString() : value;
        if (!src) return h("div", {});
        return h("img", { src: src, style: { maxWidth: "300px" } });
      },
    });

    CMS.registerWidget("cropped-image", CroppedImageControl, CroppedImagePreview);
    
    var FavoritenPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var favoriten = entry.getIn(["data", "favoriten"]) || [];

        return h(
          "div",
          {
            style: {
              background: "#000",
              color: "#fafafa",
              padding: "24px",
              fontFamily: "sans-serif",
              minHeight: "100%",
            },
          },
          h(
            "h1",
            {
              style: {
                fontFamily: "'Berkshire Swash', cursive",
                fontWeight: 400,
                fontSize: "2.2rem",
                marginBottom: "20px",
              },
            },
            "Favoriten"
          ),
          h(
            "div",
            {
              style: {
                display: "grid",
                gridTemplateColumns: "repeat(2, 1fr)",
                gap: "12px",
              },
            },
            favoriten.toArray
              ? favoriten.toArray().map(function (fav, i) {
                  var ort = fav.get("ort") || "";
                  var index = fav.get("index");
                  var groesse = fav.get("groesse") || "";
                  var isGross = groesse === "gross";
                  return h(
                    "div",
                    {
                      key: i,
                      style: {
                        background: "#1a1a1a",
                        border: "1px solid #333",
                        borderRadius: "10px",
                        padding: "14px 16px",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                      },
                    },
                    h(
                      "div",
                      {},
                      h(
                        "div",
                        {
                          style: {
                            fontSize: "16px",
                            fontWeight: 600,
                            textTransform: "capitalize",
                          },
                        },
                        ort
                      ),
                      h(
                        "div",
                        {
                          style: { fontSize: "13px", color: "#999", marginTop: "2px" },
                        },
                        "Foto Nr. " + index
                      )
                    ),
                    h(
                      "span",
                      {
                        style: {
                          fontSize: "12px",
                          textTransform: "uppercase",
                          letterSpacing: "0.5px",
                          padding: "4px 10px",
                          borderRadius: "20px",
                          background: isGross ? "#c97b84" : "transparent",
                          border: isGross ? "none" : "1px solid #666",
                          color: isGross ? "#fff" : "#999",
                        },
                      },
                      groesse
                    )
                  );
                })
              : []
          )
        );
      },
    });

    CMS.registerPreviewTemplate("favoriten", FavoritenPreview);
  
  </script>

  <script>
    var ReisenPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var getAsset = this.props.getAsset;
        var bilder = entry.getIn(["data", "bilder"]) || [];
        var titel = entry.getIn(["data", "titel"]) || "";
        var teaser = entry.getIn(["data", "teaser"]) || "";

        return h(
          "div",
          {
            style: {
              background: "#000",
              color: "#fafafa",
              padding: "24px",
              fontFamily: "sans-serif",
              minHeight: "100%",
            },
          },
          h(
            "h1",
            {
              style: {
                fontFamily: "'Berkshire Swash', cursive",
                fontWeight: 400,
                fontSize: "2.4rem",
                marginBottom: "8px",
              },
            },
            titel
          ),
          h(
            "p",
            { style: { color: "#c97b84", marginBottom: "20px" } },
            teaser
          ),
          h(
            "p",
            {
              style: {
                fontSize: "12px",
                textTransform: "uppercase",
                letterSpacing: "1px",
                color: "#888",
                marginBottom: "10px",
              },
            },
            "So sieht die Reihenfolge auf der Website aus (ganz links = erstes Bild):"
          ),
          h(
            "div",
            {
              style: {
                display: "grid",
                gridTemplateColumns: "repeat(4, 1fr)",
                gap: "10px",
              },
            },
            bilder.toArray
              ? bilder.toArray().map(function (bild, i) {
                  return h("div", { key: i, style: { position: "relative" } },
                    h("img", {
                      src: getAsset(bild).toString(),
                      style: {
                        width: "100%",
                        height: "160px",
                        objectFit: "cover",
                        borderRadius: "8px",
                        display: "block",
                      },
                    }),
                    h(
                      "span",
                      {
                        style: {
                          position: "absolute",
                          top: "6px",
                          left: "6px",
                          background: "rgba(0,0,0,0.7)",
                          color: "#fff",
                          fontSize: "12px",
                          padding: "2px 8px",
                          borderRadius: "10px",
                        },
                      },
                      i + 1
                    )
                  );
                })
              : []
          )
        );
      },
    });

    CMS.registerPreviewTemplate("reisen", ReisenPreview);
  </script>
</body>
</html>
